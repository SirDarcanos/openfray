<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Apply the theme shared with the marketing site (openfray-theme) before
      // paint to avoid a flash. Dark is the default unless 'light' was chosen.
      try {
        if (localStorage.getItem('openfray-theme') !== 'light') {
          document.documentElement.classList.add('dark')
        }
      } catch (e) {
        document.documentElement.classList.add('dark')
      }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenFray — DnD 5e Combat Console</title>
    <meta
      name="description"
      content="A fast, browser-based combat console for Game Masters running DnD 5e."
    />
    <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23818cf8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'&gt;&lt;polyline points='14.5 17.5 3 6 3 3 6 3 17.5 14.5'/&gt;&lt;line x1='13' y1='19' x2='19' y2='13'/&gt;&lt;line x1='16' y1='16' x2='20' y2='20'/&gt;&lt;line x1='19' y1='21' x2='21' y2='19'/&gt;&lt;polyline points='14.5 6.5 18 3 21 3 21 6 17.5 9.5'/&gt;&lt;line x1='5' y1='14' x2='9' y2='18'/&gt;&lt;line x1='7' y1='17' x2='4' y2='20'/&gt;&lt;line x1='3' y1='19' x2='5' y2='21'/&gt;&lt;/svg&gt;" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
