<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found — OpenFray</title>
    <meta name="description" content="That page wandered off the battle map." />
    <link rel="icon" href="/favicon.svg" />
    <link rel="stylesheet" href="/site.css" />
    <script>
      (function () { try { if (localStorage.getItem('openfray-theme') === 'light') document.documentElement.classList.add('light'); } catch (e) {} })();
    </script>
  </head>
  <body>
    <main class="hero">
      <span class="badge">404</span>
      <h1>Page not found</h1>
      <p class="tagline">
        That page wandered off the battle map. The link may be broken, or the page may have moved.
      </p>
      <a class="cta" href="/">Back to home →</a>
      <p class="disclaimer">
        Looking for the app? <a href="/console/">Open the console</a>.
      </p>
    </main>

    <script src="/site.js"></script>
  </body>
</html>
